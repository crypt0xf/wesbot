# =============================================================================
# wesbot — Lavalink v4 configuration
# Built-in YouTube source was removed in v4; we use the youtube-source plugin
# and LavaSrc for Spotify / Apple Music / Deezer / Yandex.
# =============================================================================

server:
  port: 2333
  address: 0.0.0.0
  http2:
    enabled: false

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    # Active clients — order matters (first = preferred). MUSIC + WEB + ANDROID_MUSIC
    # gives the widest compatibility with the least cookie dependency in 2026.
    clients:
      - MUSIC
      - WEB
      - ANDROID_MUSIC
      - TVHTML5EMBEDDED
    # Optional — paste a browser cookies.txt if you hit throttling. Empty disables.
    # oauth:
    #   enabled: false
    #   refreshToken: ''

lavalink:
  plugins:
    - dependency: 'dev.lavalink.youtube:youtube-plugin:1.18.0'
      snapshot: false
  server:
    password: '${LAVALINK_SERVER_PASSWORD:youshallnotpass}'
    sources:
      # Built-in YouTube is disabled; we use the youtube-plugin instead
      youtube: false
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
    filters:
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: true
      rotation: true
      channelMix: true
      lowPass: true
    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    opusEncodingQuality: 10
    resamplingQuality: LOW
    trackStuckThresholdMs: 10000
    useSeekGhosting: true
    youtubePlaylistLoadLimit: 6
    playerUpdateInterval: 5
    gc-warnings: true

metrics:
  prometheus:
    enabled: true
    endpoint: /metrics

sentry:
  dsn: ''
  environment: ''

logging:
  file:
    path: ./logs/
  level:
    root: INFO
    lavalink: INFO
  request:
    enabled: false
  logback:
    rollingpolicy:
      max-file-size: 25MB
      max-history: 7
